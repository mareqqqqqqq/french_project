<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Météo & Lieux — Apprends le français</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { fontFamily: { sans: ['Inter', 'ui-sans-serif', 'system-ui'] } } },
    };
  </script>
  <style>
    html, body { font-family: 'Inter', system-ui, sans-serif; }
    body { background: #F4F7FB; }
    @keyframes shine { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-thumb { background: #d8dee8; border-radius: 8px; }
    ::-webkit-scrollbar-thumb:hover { background: #b9c3d3; }
  </style>

  <!-- React + ReactDOM (UMD globals for Babel) -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="importmap">
  {
    "imports": {
      "react": "./frontend/shims/shim-react.js",
      "react-dom": "./frontend/shims/shim-react-dom.js",
      "react/jsx-runtime": "./frontend/shims/shim-jsx-runtime.js",
      "react/jsx-dev-runtime": "./frontend/shims/shim-jsx-runtime.js",
      "framer-motion": "https://esm.sh/framer-motion@11.11.17?external=react,react-dom",
      "lucide-react": "https://esm.sh/lucide-react@0.453.0?external=react"
    }
  }
  </script>
</head>
<body class="font-sans">
  <div id="root">
    <div style="display:grid;place-items:center;height:100vh;color:#94a3b8;font-family:Inter,sans-serif;font-size:13px;">Chargement…</div>
  </div>

  <script type="module">
    import * as FM from 'framer-motion';
    import * as Lucide from 'lucide-react';
    window.FramerMotion = FM;
    window.motion = FM.motion;
    window.AnimatePresence = FM.AnimatePresence;
    window.LucideIcons = Lucide;
    window.dispatchEvent(new Event('libsReady'));
  </script>

  <script>
    async function loadAppScripts() {
      const files = [
        'frontend/data/data.js',
        'frontend/src/ui.jsx',
        'frontend/src/components/sidebar.jsx',
        'frontend/src/components/header.jsx',
        'frontend/src/features/step-vocab.jsx',
        'frontend/src/features/step-match.jsx',
        'frontend/src/features/step-fill.jsx',
        'frontend/src/features/step-result.jsx',
        'frontend/src/features/auth-modal.jsx',
        'frontend/src/app.jsx', // Главный файл всегда последний!
      ];
      try {
        for (const f of files) {
          const res = await fetch(f);
          let code = await res.text();
          if (f.endsWith('.jsx')) {
            code = Babel.transform(code, { presets: ['react'], filename: f }).code;
          }
          // Use a script tag so errors surface with the right filename
          const s = document.createElement('script');
          s.textContent = code + `\n//# sourceURL=${f}`;
          document.body.appendChild(s);
        }
      } catch (err) {
        console.error('App load error:', err);
        document.getElementById('root').innerHTML =
          '<div style="padding:40px;color:#b91c1c;font-family:monospace;">' +
          'Erreur de chargement: ' + (err && err.message ? err.message : err) + '</div>';
      }
    }
    window.addEventListener('libsReady', loadAppScripts);
  </script>
</body>
</html>
